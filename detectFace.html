<!DOCTYPE html>
<html>
<head>
    <title>ESP32 Camera Face Mesh</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Add this to your existing styles */
        .error-details {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            font-family: monospace;
            white-space: pre-wrap;
            display: none;
        }
        .manual-url {
            margin-top: 20px;
            padding: 15px;
            background: #e9ecef;
            border-radius: 5px;
        }
        .manual-url input {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📹 ESP32 Camera Face Mesh</h1>
        
        <!-- Add error display -->
        <div id="errorDetails" class="error-details"></div>
        
        <!-- Manual model URL fallback -->
        <div class="manual-url" id="manualUrl" style="display: none;">
            <h3>🔧 Manual Model Loading</h3>
            <p>The model failed to load automatically. Try entering the CDN URL manually:</p>
            <input type="text" id="modelUrl" value="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.model" readonly>
            <button onclick="loadModelManually()">Load Model</button>
        </div>
        
        <!-- Rest of your HTML remains the same -->
        <div class="url-input-section">
            <h3>1️⃣ Enter Camera URL</h3>
            <div class="input-group">
                <input type="text" id="cameraUrl" value="http://192.168.31.214">
                <button onclick="connectToCamera()" id="connectBtn">Connect</button>
            </div>
            <div id="connectionStatus" class="status" style="display: none;"></div>
        </div>
        
        <!-- Model loading indicator -->
        <div class="model-loading" id="modelLoading">
            <div>Loading Face Mesh Model...</div>
            <div class="progress-bar">
                <div class="progress-fill" id="modelProgress"></div>
            </div>
            <div id="modelStatus">Downloading from CDN...</div>
        </div>
        
        <!-- Video container -->
        <div class="video-container" id="videoContainer" style="display: none;">
            <img id="cameraStream" crossorigin="anonymous">
            <canvas id="overlayCanvas"></canvas>
        </div>
        
        <!-- Stats -->
        <div class="stats" id="statsPanel" style="display: none;">
            <div class="stat-item">
                <div>FPS</div>
                <div class="stat-value" id="fpsDisplay">0</div>
            </div>
            <div class="stat-item">
                <div>Faces</div>
                <div class="stat-value" id="faceCount">0</div>
            </div>
        </div>
    </div>

    <!-- MediaPipe Face Mesh Library -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js"></script>
    
    <script>
        // Enhanced error handling
        window.addEventListener('error', function(e) {
            const errorDiv = document.getElementById('errorDetails');
            errorDiv.style.display = 'block';
            errorDiv.innerHTML += `<strong>Error:</strong> ${e.message}<br>`;
            errorDiv.innerHTML += `<strong>File:</strong> ${e.filename}<br>`;
            errorDiv.innerHTML += `<strong>Line:</strong> ${e.lineno}<br><br>`;
            
            // Show manual URL option
            document.getElementById('manualUrl').style.display = 'block';
        });

        // Manual model loading function
        async function loadModelManually() {
            const modelUrl = document.getElementById('modelUrl').value;
            document.getElementById('modelStatus').textContent = 'Loading manually...';
            
            try {
                const response = await fetch(modelUrl);
                if (response.ok) {
                    document.getElementById('modelStatus').textContent = 'Model loaded!';
                    setTimeout(() => {
                        document.getElementById('modelLoading').style.display = 'none';
                    }, 500);
                    initFaceMesh();
                }
            } catch (error) {
                document.getElementById('errorDetails').innerHTML += 
                    `<strong>Manual load failed:</strong> ${error.message}<br>`;
            }
        }

        // Rest of your existing JavaScript with added error handling
        let faceMesh = null;
        let isModelLoaded = false;

        async function initFaceMesh() {
            try {
                faceMesh = new FaceMesh({
                    locateFile: (file) => {
                        console.log('Loading file:', file);
                        return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/${file}`;
                    }
                });

                faceMesh.setOptions({
                    maxNumFaces: 3,
                    refineLandmarks: true,
                    minDetectionConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });

                faceMesh.onResults(onFaceMeshResults);
                
                // Update progress
                let progress = 0;
                const interval = setInterval(() => {
                    progress += 10;
                    document.getElementById('modelProgress').style.width = progress + '%';
                    if (progress >= 100) {
                        clearInterval(interval);
                        isModelLoaded = true;
                    }
                }, 300);
                
            } catch (error) {
                document.getElementById('errorDetails').style.display = 'block';
                document.getElementById('errorDetails').innerHTML += 
                    `<strong>FaceMesh init failed:</strong> ${error.message}<br>`;
            }
        }

        function onFaceMeshResults(results) {
            // Your existing face mesh results handler
            if (results.multiFaceLandmarks) {
                document.getElementById('faceCount').textContent = results.multiFaceLandmarks.length;
                // Add your drawing code here
            }
        }

        // Initialize on page load
        window.onload = function() {
            console.log('Page loaded, checking MediaPipe...');
            if (typeof FaceMesh !== 'undefined') {
                console.log('FaceMesh library loaded successfully');
                initFaceMesh();
            } else {
                document.getElementById('errorDetails').style.display = 'block';
                document.getElementById('errorDetails').innerHTML = 
                    '❌ FaceMesh library failed to load. Check network connection.';
                document.getElementById('manualUrl').style.display = 'block';
            }
        };
    </script>
</body>
</html>
