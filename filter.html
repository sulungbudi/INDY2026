<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcam Filter 3x3 - EDGE DETECTION JELAS (tanpa auto-levels)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #0a0a18;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .app {
            max-width: 1200px;
            width: 100%;
            background: #1a1a30;
            border-radius: 2.5rem;
            padding: 2rem;
            box-shadow: 0 25px 45px black;
            border: 1px solid #50508a;
        }
        
        .dual-view {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
            margin-bottom: 2rem;
        }
        
        .view-card {
            flex: 1 1 400px;
            min-width: 300px;
            background: #22223e;
            border-radius: 2rem;
            padding: 1.5rem;
            border: 1px solid #6f6fb8;
        }
        
        .view-header {
            background: #2d2d55;
            padding: 0.7rem 1.5rem;
            border-radius: 3rem;
            color: white;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            border: 1px solid #9191e6;
        }
        
        video, canvas {
            width: 100%;
            aspect-ratio: 4/3;
            border-radius: 1.5rem;
            background: #111122;
            border: 3px solid #6a6ab3;
            display: block;
        }
        
        video {
            transform: scaleX(-1);
        }
        
        /* kernel kecil */
        .kernel-bar {
            background: #232342;
            border-radius: 4rem;
            padding: 1.2rem 2rem;
            border: 1px solid #7f7fc9;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 2rem;
        }
        
        .kernel-title {
            background: #323262;
            padding: 0.6rem 1.8rem;
            border-radius: 3rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            border: 1px solid #a0a0f0;
        }
        
        .kernel-title span {
            color: white;
            font-weight: 600;
        }
        
        #resetKernel {
            background: #4a4a8a;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.6rem 1.5rem;
            border-radius: 3rem;
            cursor: pointer;
            border: 1px solid #bdbdff;
            box-shadow: 0 4px 0 #26264a;
        }
        
        #resetKernel:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #26264a;
        }
        
        .grid-3x3 {
            display: flex;
            gap: 8px;
            background: #191933;
            padding: 0.8rem 1.8rem;
            border-radius: 3rem;
        }
        
        .grid-col {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .grid-col input {
            width: 58px;
            height: 52px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            background: #0c0c22;
            border: 2px solid #6464b0;
            color: white;
            border-radius: 12px;
        }
        
        .grid-col input:focus {
            outline: none;
            border-color: #c4c4ff;
            background: #1e1e42;
        }
        
        .hint-text {
            color: #b8b8ff;
            background: #2d2d5a;
            padding: 0.5rem 1.2rem;
            border-radius: 3rem;
            font-size: 0.85rem;
        }
        
        .footer {
            text-align: center;
            color: #7d7dc0;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            border-top: 1px dashed #56569a;
            padding-top: 1rem;
        }

        .control-row {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .slider-container {
            background: #2d2d55;
            padding: 0.5rem 1.5rem;
            border-radius: 3rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .slider-container input {
            width: 150px;
            cursor: pointer;
        }

        .slider-container span {
            min-width: 45px;
            text-align: center;
            color: #ffd966;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="app">
    <!-- KIRI: WEBCAM || KANAN: FILTER -->
    <div class="dual-view">
        <div class="view-card">
            <div class="view-header">
                <span>📷 WEBCAM</span>
                <span>INPUT</span>
            </div>
            <video id="webcam" autoplay playsinline muted></video>
            <div style="color:#b4b4f0; margin-top:10px;">400x300 (mirror)</div>
        </div>
        
        <div class="view-card">
            <div class="view-header">
                <span>🎛️ FILTER 3x3</span>
                <span>OUTPUT</span>
            </div>
            <canvas id="filterCanvas" width="400" height="300"></canvas>
            <div style="color:#b4b4f0; margin-top:10px;">hasil edge detection + kontras</div>
        </div>
    </div>
    
    <!-- KERNEL MINI -->
    <div class="kernel-bar">
        <div class="kernel-title">
            <span>🎯 KERNEL 3x3</span>
            <button id="resetKernel">↺ reset edge</button>
        </div>
        
        <!-- 3 kolom input -->
        <div class="grid-3x3">
            <div class="grid-col">
                <input id="k00" type="number" value="0" step="any">
                <input id="k10" type="number" value="-1" step="any">
                <input id="k20" type="number" value="0" step="any">
            </div>
            <div class="grid-col">
                <input id="k01" type="number" value="-1" step="any">
                <input id="k11" type="number" value="4" step="any">
                <input id="k21" type="number" value="-1" step="any">
            </div>
            <div class="grid-col">
                <input id="k02" type="number" value="0" step="any">
                <input id="k12" type="number" value="-1" step="any">
                <input id="k22" type="number" value="0" step="any">
            </div>
        </div>
        
        <div class="hint-text">
            ⚡ dinormalisasi otomatis
        </div>
    </div>

    <!-- Kontrol Kontras dan Brightness -->
    <div class="control-row">
        <div class="slider-container">
            <span>✨ Kontras:</span>
            <input type="range" id="contrastSlider" min="0.5" max="5" step="0.1" value="2.5">
            <span id="contrastValue">2.5x</span>
        </div>
        <div class="slider-container">
            <span>💡 Brightness:</span>
            <input type="range" id="brightnessSlider" min="-50" max="50" step="1" value="10">
            <span id="brightnessValue">10</span>
        </div>
        <div class="slider-container">
            <span>⚡ Invert:</span>
            <input type="checkbox" id="invertCheckbox" style="width: 20px; height: 20px; accent-color: #6a6ab3;">
        </div>
    </div>
    
    <div class="footer">
        ✦ edge detection (Laplacian) ✦ tanpa auto-levels ✦ kontras dan brightness bisa diatur
    </div>
</div>

<script>
(function() {
    // === SETUP CANVAS ===
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('filterCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    
    // === INPUT KERNEL ===
    const kernelIds = ['k00','k01','k02','k10','k11','k12','k20','k21','k22'];
    const inputs = kernelIds.map(id => document.getElementById(id));
    
    const EDGE_KERNEL = [0, -1, 0, -1, 4, -1, 0, -1, 0];
    
    // Set nilai awal
    inputs.forEach((inp, i) => inp.value = EDGE_KERNEL[i]);
    
    // Tombol reset
    document.getElementById('resetKernel').addEventListener('click', () => {
        inputs.forEach((inp, i) => inp.value = EDGE_KERNEL[i]);
    });
    
    // === KONTROL SLIDER ===
    const contrastSlider = document.getElementById('contrastSlider');
    const contrastValue = document.getElementById('contrastValue');
    const brightnessSlider = document.getElementById('brightnessSlider');
    const brightnessValue = document.getElementById('brightnessValue');
    const invertCheckbox = document.getElementById('invertCheckbox');
    
    contrastSlider.addEventListener('input', () => {
        contrastValue.textContent = contrastSlider.value + 'x';
    });
    
    brightnessSlider.addEventListener('input', () => {
        brightnessValue.textContent = brightnessSlider.value;
    });
    
    // === WEBCAM ===
    async function startWebcam() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { width: 400, height: 300, facingMode: 'user' }
            });
            video.srcObject = stream;
        } catch (err) {
            alert('Webcam error: ' + err.message);
        }
    }
    startWebcam();
    
    // === BACA KERNEL ===
    function getKernel() {
        return inputs.map(inp => {
            const val = parseFloat(inp.value);
            return isNaN(val) ? 0 : val;
        });
    }
    
    // === NORMALISASI ===
    function normalizeKernel(kernel) {
        let sumAbs = 0;
        for (let i = 0; i < 9; i++) sumAbs += Math.abs(kernel[i]);
        if (sumAbs < 1e-6) return null;
        return kernel.map(v => v / sumAbs);
    }
    
    // === KONVOLUSI TANPA AUTO-LEVELS ===
    function convolve(data, width, height, kernel, contrast, brightness, invert) {
        const output = new Uint8ClampedArray(data.length);
        const normK = normalizeKernel(kernel);
        
        // Fallback jika kernel nol
        if (!normK) {
            for (let i = 0; i < data.length; i++) output[i] = data[i];
            return new ImageData(output, width, height);
        }
        
        // Langsung konvolusi dan aplikasikan contrast/brightness
        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                const centerIdx = (y * width + x) * 4;
                
                let r = 0, g = 0, b = 0;
                
                for (let ky = -1; ky <= 1; ky++) {
                    for (let kx = -1; kx <= 1; kx++) {
                        // Mirror padding
                        let nx = x + kx;
                        let ny = y + ky;
                        
                        if (nx < 0) nx = -nx - 1;
                        if (nx >= width) nx = 2 * width - nx - 1;
                        if (ny < 0) ny = -ny - 1;
                        if (ny >= height) ny = 2 * height - ny - 1;
                        
                        const neighborIdx = (ny * width + nx) * 4;
                        const weight = normK[(ky + 1) * 3 + (kx + 1)];
                        
                        r += data[neighborIdx] * weight;
                        g += data[neighborIdx + 1] * weight;
                        b += data[neighborIdx + 2] * weight;
                    }
                }
                
                // Aplikasikan contrast dan brightness
                r = (r - 128) * contrast + 128 + brightness;
                g = (g - 128) * contrast + 128 + brightness;
                b = (b - 128) * contrast + 128 + brightness;
                
                // Invert jika diperlukan
                if (invert) {
                    r = 255 - r;
                    g = 255 - g;
                    b = 255 - b;
                }
                
                // Clamping
                output[centerIdx] = Math.min(255, Math.max(0, Math.round(r)));
                output[centerIdx + 1] = Math.min(255, Math.max(0, Math.round(g)));
                output[centerIdx + 2] = Math.min(255, Math.max(0, Math.round(b)));
                output[centerIdx + 3] = data[centerIdx + 3];
            }
        }
        
        return new ImageData(output, width, height);
    }
    
    // === LOOP FILTER ===
    function processFrame() {
        if (video.readyState < 2) {
            requestAnimationFrame(processFrame);
            return;
        }
        
        // Gambar video ke canvas
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Ambil data piksel
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        
        // Ambil kernel dan nilai slider
        const kernel = getKernel();
        const contrast = parseFloat(contrastSlider.value);
        const brightness = parseFloat(brightnessSlider.value);
        const invert = invertCheckbox.checked;
        
        // Konvolusi tanpa auto-levels
        const filteredData = convolve(
            imageData.data, 
            canvas.width, 
            canvas.height, 
            kernel,
            contrast,
            brightness,
            invert
        );
        
        // Tampilkan hasil
        ctx.putImageData(filteredData, 0, 0);
        
        requestAnimationFrame(processFrame);
    }
    
    // Mulai loop
    video.addEventListener('loadeddata', () => {
        processFrame();
    });
    
    if (video.readyState >= 2) {
        processFrame();
    }
})();
</script>
</body>
</html>
