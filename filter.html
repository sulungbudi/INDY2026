<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcam Filter 3x3 - LANCAR</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #0a0a14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: #161625;
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 30px 50px rgba(0,0,0,0.7);
            border: 1px solid #3d3d66;
        }
        
        /* DUA KOLOM BESAR */
        .video-row {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
            margin-bottom: 2rem;
        }
        
        .video-card {
            flex: 1 1 400px;
            min-width: 320px;
            background: #1a1a2e;
            border-radius: 1.8rem;
            padding: 1.5rem;
            border: 1px solid #54548a;
            box-shadow: 0 15px 30px -10px black;
        }
        
        .video-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            color: #d0d0ff;
            font-weight: 600;
            background: #22223b;
            padding: 0.6rem 1.2rem;
            border-radius: 3rem;
            border: 1px solid #6a6aa8;
        }
        
        .video-header span:first-child {
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }
        
        .video-header span:last-child {
            background: #2f2f55;
            padding: 0.3rem 1rem;
            border-radius: 3rem;
            font-size: 0.8rem;
            color: #c4c4ff;
        }
        
        video, canvas {
            width: 100%;
            aspect-ratio: 4/3;
            border-radius: 1.5rem;
            background: #0b0b18;
            border: 3px solid #5a5a99;
            display: block;
            box-shadow: 0 10px 20px black;
        }
        
        video {
            transform: scaleX(-1); /* mirror */
        }
        
        canvas {
            transform: scaleX(-1); /* mirror biar konsisten */
        }
        
        /* KERNEL MINI */
        .kernel-section {
            background: #1f1f36;
            border-radius: 5rem;
            padding: 1.2rem 2rem;
            border: 1px solid #6d6daa;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 2rem;
        }
        
        .kernel-label {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: #2b2b4a;
            padding: 0.5rem 1.5rem;
            border-radius: 3rem;
            border: 1px solid #8a8ac7;
        }
        
        .kernel-label span {
            color: #ececff;
            font-weight: 600;
            font-size: 1rem;
        }
        
        #resetEdgeBtn {
            background: #41416e;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.6rem 1.4rem;
            border-radius: 3rem;
            font-size: 0.8rem;
            cursor: pointer;
            border: 1px solid #a6a6f0;
            box-shadow: 0 4px 0 #23233a;
            transition: 0.08s;
        }
        
        #resetEdgeBtn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #23233a;
        }
        
        /* 3x3 grid kecil */
        .kernel-grid {
            display: flex;
            gap: 0.4rem;
            background: #151527;
            padding: 0.8rem 1.5rem;
            border-radius: 4rem;
            border: 1px solid #6f6fb0;
        }
        
        .kernel-col {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        
        .kernel-col input {
            width: 55px;
            height: 50px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            background: #0d0d1f;
            border: 2px solid #5b5b9a;
            color: #ffffff;
            border-radius: 12px;
            padding: 0;
            box-shadow: inset 0 2px 5px black;
        }
        
        .kernel-col input:focus {
            outline: none;
            border-color: #b3aaff;
            background: #1d1d3b;
        }
        
        .info-text {
            color: #a8a8e6;
            font-size: 0.85rem;
            background: #262642;
            padding: 0.4rem 1.2rem;
            border-radius: 3rem;
            white-space: nowrap;
        }
        
        .footer {
            text-align: center;
            color: #6f6faa;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            border-top: 1px dashed #4a4a7a;
            padding-top: 1rem;
        }
        
        @media (max-width: 700px) {
            .kernel-section { flex-direction: column; gap: 1rem; }
            .container { padding: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- WEBCAM (KIRI) DAN FILTER (KANAN) BESAR -->
    <div class="video-row">
        <!-- KIRI: WEBCAM -->
        <div class="video-card">
            <div class="video-header">
                <span>📹 WEBCAM</span>
                <span>LIVE</span>
            </div>
            <video id="webcam" autoplay playsinline muted></video>
            <div style="margin-top: 10px; color: #a6a6dd; font-size: 0.9rem; padding-left: 10px;">
                ⬅️ mirror
            </div>
        </div>
        
        <!-- KANAN: HASIL FILTER -->
        <div class="video-card">
            <div class="video-header">
                <span>🎛️ HASIL FILTER 3x3</span>
                <span>REALTIME</span>
            </div>
            <canvas id="filterCanvas" width="400" height="300"></canvas>
            <div style="margin-top: 10px; color: #a6a6dd; font-size: 0.9rem; padding-left: 10px;">
                ⬅️ kernel di bawah bisa diubah
            </div>
        </div>
    </div>
    
    <!-- KONTROL KERNEL MINI (TIDAK BESAR) -->
    <div class="kernel-section">
        <div class="kernel-label">
            <span>⚡ 3x3 KERNEL</span>
            <button id="resetEdgeBtn">↺ reset edge</button>
        </div>
        
        <!-- 9 input dengan susunan baris-major (kiri ke kanan, atas ke bawah) -->
        <div class="kernel-grid">
            <!-- Baris 0 -->
            <div class="kernel-col">
                <input id="k00" type="number" value="0" step="any">
                <input id="k10" type="number" value="-1" step="any">
                <input id="k20" type="number" value="0" step="any">
            </div>
            <div class="kernel-col">
                <input id="k01" type="number" value="-1" step="any">
                <input id="k11" type="number" value="4" step="any">
                <input id="k21" type="number" value="-1" step="any">
            </div>
            <div class="kernel-col">
                <input id="k02" type="number" value="0" step="any">
                <input id="k12" type="number" value="-1" step="any">
                <input id="k22" type="number" value="0" step="any">
            </div>
        </div>
        
        <div class="info-text">
            ⚡ normalisasi otomatis (dibagi total |bobot|)
        </div>
    </div>
    
    <div class="footer">
        ✦ filter 3x3 konvolusi ✦ default: edge detection ✦ webcam diperlukan
    </div>
</div>

<script>
(function() {
    // ==================== ELEMEN ====================
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('filterCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    
    // Input kernel: urut baris-major (baris 0, baris 1, baris 2)
    // id sesuai posisi: baris dulu, baru kolom
    const kernelIds = [
        'k00', 'k01', 'k02',
        'k10', 'k11', 'k12',
        'k20', 'k21', 'k22'
    ];
    
    const inputs = kernelIds.map(id => document.getElementById(id));
    
    // Kernel default edge detection
    const DEFAULT_KERNEL = [0, -1, 0, -1, 4, -1, 0, -1, 0];
    
    // Set nilai awal
    inputs.forEach((input, index) => {
        input.value = DEFAULT_KERNEL[index];
    });
    
    // Tombol reset
    document.getElementById('resetEdgeBtn').addEventListener('click', () => {
        inputs.forEach((input, index) => {
            input.value = DEFAULT_KERNEL[index];
        });
    });
    
    // ==================== WEBCAM ====================
    async function initWebcam() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    width: { ideal: 400 },
                    height: { ideal: 300 },
                    facingMode: 'user'
                }
            });
            video.srcObject = stream;
        } catch (err) {
            alert('Tidak bisa mengakses webcam: ' + err.message);
        }
    }
    initWebcam();
    
    // ==================== KERNEL & NORMALISASI ====================
    function getCurrentKernel() {
        return inputs.map(inp => {
            const val = parseFloat(inp.value);
            return isNaN(val) ? 0 : val;
        });
    }
    
    // Normalisasi dengan jumlah absolut
    function normalizeKernel(kernel) {
        let sumAbs = 0;
        for (let i = 0; i < 9; i++) {
            sumAbs += Math.abs(kernel[i]);
        }
        if (sumAbs < 1e-6) return null; // hindari pembagian 0
        return kernel.map(v => v / sumAbs);
    }
    
    // ==================== KONVOLUSI ====================
    function applyConvolution(imageData, width, height, kernel) {
        const data = imageData.data;
        const output = new Uint8ClampedArray(data.length);
        
        // Normalisasi kernel
        const normKernel = normalizeKernel(kernel);
        if (!normKernel) {
            // Jika kernel nol semua, salin gambar asli (identitas)
            for (let i = 0; i < data.length; i++) {
                output[i] = data[i];
            }
            return new ImageData(output, width, height);
        }
        
        // Konvolusi dengan mirror padding
        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                const centerIdx = (y * width + x) * 4;
                
                let r = 0, g = 0, b = 0;
                
                // Loop kernel 3x3
                for (let ky = -1; ky <= 1; ky++) {
                    for (let kx = -1; kx <= 1; kx++) {
                        // Koordinat tetangga dengan mirror padding
                        let nx = x + kx;
                        let ny = y + ky;
                        
                        // Mirror jika keluar batas
                        if (nx < 0) nx = -nx - 1;
                        if (nx >= width) nx = 2 * width - nx - 1;
                        if (ny < 0) ny = -ny - 1;
                        if (ny >= height) ny = 2 * height - ny - 1;
                        
                        const neighborIdx = (ny * width + nx) * 4;
                        const weight = normKernel[(ky + 1) * 3 + (kx + 1)];
                        
                        r += data[neighborIdx] * weight;
                        g += data[neighborIdx + 1] * weight;
                        b += data[neighborIdx + 2] * weight;
                    }
                }
                
                // Clamping
                output[centerIdx] = Math.min(255, Math.max(0, Math.round(r)));
                output[centerIdx + 1] = Math.min(255, Math.max(0, Math.round(g)));
                output[centerIdx + 2] = Math.min(255, Math.max(0, Math.round(b)));
                output[centerIdx + 3] = data[centerIdx + 3]; // salin alpha
            }
        }
        
        return new ImageData(output, width, height);
    }
    
    // ==================== MIRROR DATA (untuk konsistensi) ====================
    function mirrorImageData(imageData, width, height) {
        const data = imageData.data;
        const mirrored = new Uint8ClampedArray(data.length);
        
        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                const srcIdx = (y * width + x) * 4;
                const dstIdx = (y * width + (width - 1 - x)) * 4;
                
                mirrored[dstIdx] = data[srcIdx];
                mirrored[dstIdx + 1] = data[srcIdx + 1];
                mirrored[dstIdx + 2] = data[srcIdx + 2];
                mirrored[dstIdx + 3] = data[srcIdx + 3];
            }
        }
        
        return new ImageData(mirrored, width, height);
    }
    
    // ==================== LOOP UTAMA (PASTI JALAN) ====================
    function processFrame() {
        if (video.readyState < 2) {
            requestAnimationFrame(processFrame);
            return;
        }
        
        // Gambar video ke canvas ukuran tetap 400x300
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Ambil data pixel
        let sourceData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        
        // Mirror data agar sesuai dengan tampilan video (yang di-mirror CSS)
        let mirroredSource = mirrorImageData(sourceData, canvas.width, canvas.height);
        
        // Ambil kernel dari input
        const kernel = getCurrentKernel();
        
        // Terapkan konvolusi
        let filteredData = applyConvolution(mirroredSource, canvas.width, canvas.height, kernel);
        
        // Mirror kembali hasilnya agar tampilan canvas (juga di-mirror CSS) menjadi benar
        let finalData = mirrorImageData(filteredData, canvas.width, canvas.height);
        
        // Tampilkan hasil
        ctx.putImageData(finalData, 0, 0);
        
        // Loop terus menerus
        requestAnimationFrame(processFrame);
    }
    
    // Tunggu video siap lalu mulai loop
    video.addEventListener('loadeddata', () => {
        processFrame();
    });
    
    // Jika video sudah siap sebelum event
    if (video.readyState >= 2) {
        processFrame();
    }
})();
</script>
</body>
</html>
